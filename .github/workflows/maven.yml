# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: '21'

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ env.JAVA_VERSION }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-${{ env.JAVA_VERSION }}-
          ${{ runner.os }}-maven-

    - name: Build and verify with Maven (Java ${{ env.JAVA_VERSION }})
      run: mvn -B clean verify --file pom.xml
    
    - name: Upload JUnit XML reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: junit-xml
        path: '**/target/surefire-reports/*.xml'
        if-no-files-found: ignore
        retention-days: 30
    
    - name: Upload Surefire raw reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: surefire-raw
        path: |
          **/target/surefire-reports/*.txt
          **/target/surefire-reports/*.dump
        if-no-files-found: ignore
        retention-days: 30
    
    - name: Generate Surefire HTML report
      if: always()
      run: mvn -B surefire-report:report
      continue-on-error: true
    
    - name: Upload Surefire HTML report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: surefire-html
        path: '**/target/site/'
        if-no-files-found: ignore
        retention-days: 30
    
    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v3.0.0
      with:
        name: JUnit Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit
        fail-on-error: false
    
    - name: Upload Jacoco coverage report
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-report
        path: '**/target/site/jacoco/'
        retention-days: 30
    
    - name: Upload Checkstyle report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: checkstyle-report
        path: '**/target/checkstyle-result.xml'
        if-no-files-found: ignore
        retention-days: 30
    
    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: spotbugs-report
        path: '**/target/spotbugsXml.xml'
        if-no-files-found: ignore
        retention-days: 30
    
    - name: Upload PMD report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: pmd-report
        path: '**/target/pmd.xml'
        if-no-files-found: ignore
        retention-days: 30
    
    - name: Debug coverage path
      if: always()
      run: find . -maxdepth 5 -path '*/target/site/jacoco' -type d -print
    
    - name: Upload coverage reports to Codecov
      if: always()
      uses: codecov/codecov-action@v6
      with:
        files: '**/target/site/jacoco/jacoco.xml'
        fail_ci_if_error: false
        verbose: true

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
